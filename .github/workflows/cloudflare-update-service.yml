name: Cloudflare Update Service Checks

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/bluetooth_flutter_Trace/cloudflare/update-service/**"
      - ".github/workflows/cloudflare-update-service.yml"
      - "app/bluetooth_flutter_Trace/CF-UPDATE-BACKEND-PLAN.md"
      - "CF-UPDATE-BACKEND-REVIEW-LOG.md"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "app/bluetooth_flutter_Trace/cloudflare/update-service/**"
      - ".github/workflows/cloudflare-update-service.yml"
      - "app/bluetooth_flutter_Trace/CF-UPDATE-BACKEND-PLAN.md"
      - "CF-UPDATE-BACKEND-REVIEW-LOG.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public:
    name: Public Pages Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/bluetooth_flutter_Trace/cloudflare/update-service/public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/bluetooth_flutter_Trace/cloudflare/update-service/public/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

  admin:
    name: Admin Facade Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/bluetooth_flutter_Trace/cloudflare/update-service/admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/bluetooth_flutter_Trace/cloudflare/update-service/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

  worker:
    name: Worker Typecheck and Invariants
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/bluetooth_flutter_Trace/cloudflare/update-service/worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/bluetooth_flutter_Trace/cloudflare/update-service/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Wrangler Env types
        run: npm run cf-typegen

      - name: Typecheck
        run: npm run check

      - name: Run invariant tests
        run: npm test
