name: Build Flutter Artifacts

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create or update a GitHub Release with the built APK and EXE"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use for manual publishing, for example v1.0.0"
        required: false
        type: string

env:
  PUB_HOSTED_URL: https://pub.dev
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.12"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Android SDK platform
        shell: bash
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$SDKMANAGER" ]]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses || true
          "$SDKMANAGER" --install "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android Gradle wrapper
        working-directory: android
        shell: bash
        run: |
          printf 'flutter.sdk=%s\n' "$FLUTTER_ROOT" > local.properties
          gradle wrapper --gradle-version 8.12 --distribution-type all

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare Android release asset
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/trace-android.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: release/trace-android.apk
          if-no-files-found: error

  windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Build Windows release
        run: flutter build windows --release

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath release/trace-windows.zip -Force
          Copy-Item build/windows/x64/runner/Release/ble_monitor.exe release/trace-windows.exe -Force

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: |
            release/trace-windows.zip
            release/trace-windows.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          notes="Automated release from GitHub Actions run ${GITHUB_RUN_NUMBER}."
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes "${notes}"
          else
            gh release create "${RELEASE_TAG}" --target "${GITHUB_SHA}" --title "Trace ${RELEASE_TAG}" --notes "${notes}"
          fi
          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
