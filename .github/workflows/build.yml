name: Build Flutter Artifacts

on:
  push:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.12"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android Gradle wrapper
        working-directory: android
        shell: bash
        run: |
          printf 'flutter.sdk=%s\n' "$FLUTTER_ROOT" > local.properties
          gradle wrapper --gradle-version 8.12 --distribution-type all

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/**
          if-no-files-found: error
