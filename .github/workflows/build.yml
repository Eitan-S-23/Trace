name: Build APK and EXE Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release after the build"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Optional release tag, for example v1.0.0"
        required: false
        type: string

env:
  PUB_HOSTED_URL: https://pub.dev
  FLUTTER_STORAGE_BASE_URL: https://storage.googleapis.com

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.12"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android Gradle wrapper
        working-directory: android
        shell: bash
        run: |
          printf 'flutter.sdk=%s\n' "$FLUTTER_ROOT" > local.properties
          gradle wrapper --gradle-version 8.12 --distribution-type all

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Clear cached Flutter Android artifacts
        shell: bash
        run: |
          rm -rf "$HOME/.gradle/caches/modules-2/files-2.1/io.flutter"
          rm -rf "$HOME/.gradle/caches"/transforms-*

      - name: Build release APK
        shell: bash
        run: |
          set +e
          flutter build apk --release 2>&1 | tee android-build.log
          status=${PIPESTATUS[0]}

          if [[ "$status" -ne 0 ]]; then
            summary="$(grep -Ei "FAILURE|Exception|error|Could not|Execution failed|AAPT|R8|D8|Gradle task|Target .* failed|What went wrong" android-build.log | tail -n 30)"
            if [[ -z "$summary" ]]; then
              summary="$(tail -n 40 android-build.log)"
            fi
            summary="${summary//'%'/'%25'}"
            summary="${summary//$'\n'/'%0A'}"
            summary="${summary//$'\r'/'%0D'}"
            echo "::error title=Android release build failed::${summary}"
          fi

          exit "$status"

      - name: Prepare Android release asset
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/ble-monitor-android.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/ble-monitor-android.apk
          if-no-files-found: error

  windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        continue-on-error: true
        run: flutter analyze

      - name: Build Windows release
        run: flutter build windows --release

      - name: Prepare Windows release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath release/ble-monitor-windows.zip -Force
          Copy-Item build/windows/x64/runner/Release/ble_monitor.exe release/ble-monitor-windows.exe -Force

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            release/ble-monitor-windows.zip
            release/ble-monitor-windows.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
    if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        env:
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${MANUAL_RELEASE_TAG}" ]]; then
            tag="${MANUAL_RELEASE_TAG}"
          else
            short_sha="${GITHUB_SHA::7}"
            tag="build-${GITHUB_RUN_NUMBER}-${short_sha}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          notes="Automated build from workflow run ${GITHUB_RUN_NUMBER} for commit ${GITHUB_SHA}."

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes "${notes}"
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Trace ${RELEASE_TAG}" \
              --notes "${notes}"
          fi

          gh release upload "${RELEASE_TAG}" release-assets/* --clobber
