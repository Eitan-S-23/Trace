name: Deploy Cloudflare Admin Pages

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: Cloudflare Pages project name
        required: true
        default: trace-update-admin-staging
        type: string
      branch:
        description: Pages deployment branch
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Admin Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/update-service/admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cloudflare/update-service/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Check Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" || -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::error title=Cloudflare credentials missing::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN repository secrets."
            exit 1
          fi

      - name: Deploy Pages admin facade
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          npx wrangler pages deploy ./public \
            --project-name "${PROJECT_NAME}" \
            --branch "${DEPLOY_BRANCH}" \
            --commit-dirty=true